services:
  ml-backend:
    build: ./ML-python
    ports:
      - "8000:8000"
    env_file:
      - ./ML-python/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ML_API_URL: http://localhost:8000
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "3000:80"
    depends_on:
      - ml-backend
