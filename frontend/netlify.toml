[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTTP → HTTPS redirect
[[redirects]]
  from = "http://kwhane.com/*"
  to = "https://kwhane.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.kwhane.com/*"
  to = "https://kwhane.com/:splat"
  status = 301
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
